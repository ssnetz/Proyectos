<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Control de Stock</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📦</text></svg>" />
    <script type="module" crossorigin src="/stock-control/assets/app.js"></script>
    <link rel="stylesheet" crossorigin href="/stock-control/assets/index.css">
  </head>
  <body>
    <div id="root">
      <div id="loading-fallback" style="min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;font-family:sans-serif;background:#f9fafb;">
        <div style="font-size:2.5rem">📦</div>
        <p style="color:#374151;font-size:1.1rem;margin:0">Cargando Stock Control...</p>
      </div>
    </div>
    <script>
      setTimeout(function() {
        var root = document.getElementById('root');
        var fallback = document.getElementById('loading-fallback');
        if (fallback && root && root.contains(fallback)) {
          fallback.innerHTML = '<div style="text-align:center;padding:24px">'
            + '<div style="font-size:2.5rem">⚠️</div>'
            + '<p style="color:#dc2626;font-weight:bold;margin:12px 0 4px">No se pudo cargar la aplicación</p>'
            + '<p style="color:#6b7280;font-size:.85rem;margin:0 0 8px">URL actual: <code>' + location.href + '</code></p>'
            + '<p style="color:#6b7280;font-size:.85rem;margin:0">Presione F12 → Console para ver el error exacto.</p>'
            + '<button onclick="location.reload()" style="margin-top:16px;padding:8px 20px;background:#2563eb;color:#fff;border:none;border-radius:8px;cursor:pointer">Reintentar</button>'
            + '</div>';
        }
      }, 5000);
    </script>
  </body>
</html>
