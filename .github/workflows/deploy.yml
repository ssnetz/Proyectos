name: Deploy a Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      project:
        description: "Carpeta del proyecto a desplegar (vacío = autodetectar por el último push)"
        required: false
        type: string
      dry_run:
        description: "Dry run: mostrar qué cambiaría sin tocar el servidor"
        required: false
        type: boolean
        default: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detectar proyectos a desplegar
        id: detect
        run: |
          if [ -n "${{ inputs.project }}" ]; then
            PROJECTS="${{ inputs.project }}"
          else
            CHANGED=$(git diff --name-only HEAD^ HEAD | cut -d/ -f1 | sort -u)
            PROJECTS=""
            if [ -z "$CHANGED" ] || echo "$CHANGED" | grep -qxE "deploy|\.github"; then
              # Sin archivos cambiados (ej. un commit vacío para reintentar un
              # deploy que falló antes de sincronizar nada) o cambio en
              # infraestructura de deploy compartida (ej. htaccess.template o
              # el propio workflow): redesplegar todos los proyectos en vez de
              # no hacer nada silenciosamente.
              for d in */; do
                d="${d%/}"
                if [ -d "$d/backend" ] && [ -d "$d/frontend" ] && [ ! -f "$d/.no-autodeploy" ]; then
                  PROJECTS="$PROJECTS $d"
                fi
              done
            else
              for d in $CHANGED; do
                if [ -d "$d/backend" ] && [ -d "$d/frontend" ] && [ ! -f "$d/.no-autodeploy" ]; then
                  PROJECTS="$PROJECTS $d"
                fi
              done
            fi
          fi
          echo "Proyectos a desplegar:$PROJECTS"
          echo "projects=$PROJECTS" >> "$GITHUB_OUTPUT"

      - name: Configurar Node.js
        if: steps.detect.outputs.projects != ''
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Preparar acceso SSH
        if: steps.detect.outputs.projects != ''
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.HOSTINGER_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null
          eval "$(ssh-agent -s)"
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"
          ssh-add - <<< "${{ secrets.HOSTINGER_SSH_KEY }}"

      - name: Desplegar cada proyecto detectado
        if: steps.detect.outputs.projects != ''
        env:
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_USER: ${{ secrets.HOSTINGER_USER }}
          DRY_RUN: ${{ inputs.dry_run && '1' || '0' }}
        run: |
          for p in ${{ steps.detect.outputs.projects }}; do
            echo "::group::Deploy $p"
            bash deploy/deploy.sh "$p"
            echo "::endgroup::"
          done
